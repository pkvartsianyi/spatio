name: Go bindings

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/cabi/**"
      - "crates/core/**"
      - "crates/types/**"
      - "bindings/go/**"
      - ".github/workflows/go.yml"
  push:
    branches: [main]
    paths:
      - "crates/cabi/**"
      - "crates/core/**"
      - "crates/types/**"
      - "bindings/go/**"
      - ".github/workflows/go.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Native bindings are built and tested per-OS. The cdylib is produced
        # for the runner's own platform and staged where go:embed expects it.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: bindings/go/go.sum

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-cabi-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cabi-

      - name: Build C-ABI cdylib and stage for go:embed
        shell: bash
        run: |
          cargo build -p spatio-cabi --release
          os=$(go env GOOS); arch=$(go env GOARCH)
          case "$os" in
            darwin) file=libspatio_cabi.dylib;;
            *)      file=libspatio_cabi.so;;
          esac
          dest="bindings/go/libs/${os}_${arch}"
          mkdir -p "$dest"
          cp "target/release/${file}" "$dest/"

      - name: gofmt
        working-directory: bindings/go
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "run gofmt"; exit 1; }

      - name: go vet
        working-directory: bindings/go
        run: go vet ./...

      - name: go test
        working-directory: bindings/go
        run: go test -race ./...
