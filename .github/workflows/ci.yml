name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('crates/py/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Rust formatting
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Rust linting
      - name: Run clippy (spatio-types)
        run: cargo clippy -p spatio-types --all-targets -- -D warnings

      - name: Run clippy (spatio)
        run: cargo clippy -p spatio --all-targets --all-features -- -D warnings

      - name: Run clippy (spatio-py)
        run: cargo clippy -p spatio-py --all-targets -- -D warnings

      - name: Run clippy (spatio-server)
        run: cargo clippy -p spatio-server --all-targets --all-features -- -D warnings

      - name: Run clippy (spatio-client)
        run: cargo clippy -p spatio-client --all-targets --all-features -- -D warnings

      # Rust building
      - name: Build spatio-types
        run: cargo build -p spatio-types

      - name: Build spatio (default features)
        run: cargo build -p spatio

      - name: Build spatio (all features)
        run: cargo build -p spatio --all-features

      - name: Build spatio-server
        run: cargo build -p spatio-server --all-features

      - name: Build spatio-client
        run: cargo build -p spatio-client --all-features

      # Rust testing
      - name: Run tests (spatio-types)
        run: cargo test -p spatio-types

      - name: Run tests (spatio - default features)
        run: cargo test -p spatio

      - name: Run tests (spatio - all features)
        run: cargo test -p spatio --all-features

      - name: Run tests (spatio-server)
        run: cargo test -p spatio-server --all-features

      - name: Run tests (spatio-client)
        run: cargo test -p spatio-client --all-features

      - name: Run tests (spatio-integration-tests)
        run: cargo test -p spatio-integration-tests --all-features

      - name: Run doc tests
        run: cargo test -p spatio -p spatio-types -p spatio-server --doc

      # Python testing
      - name: Install Python dependencies
        working-directory: crates/py
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools
          pip install maturin
          pip install -r requirements-dev.txt

      - name: Build Python package
        working-directory: crates/py
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        run: |
          echo "Building Python package..."
          maturin build --out dist

      - name: Install Python package
        working-directory: crates/py
        run: |
          echo "Installing Python package..."
          wheel_file=$(find dist -name "*.whl" -type f | head -1)
          if [ -z "$wheel_file" ]; then
            echo "ERROR: No wheel file found in dist directory"
            ls -la dist/
            exit 1
          fi
          echo "Found wheel file: $wheel_file"
          pip install "$wheel_file" --force-reinstall --no-deps
          echo "Verifying installation..."
          python -c "import spatio; print(f'Successfully imported spatio version {spatio.__version__}')"

      - name: Run Python tests
        working-directory: crates/py
        run: |
          echo "Running Python tests..."
          pytest -v

      - name: Run Python linting
        working-directory: crates/py
        run: |
          ruff check src/ tests/ examples/
          mypy src/

  # Test on multiple platforms
  test-platforms:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build spatio
        run: cargo build -p spatio --all-features

      - name: Run tests
        run: cargo test -p spatio -p spatio-types -p spatio-server -p spatio-integration-tests --all-features

  # Check documentation builds
  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-
            ${{ runner.os }}-cargo-

      - name: Build documentation
        run: cargo doc -p spatio -p spatio-types -p spatio-server --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # Go bindings (purego, no cgo): build the C-ABI cdylib per-OS, then test.
  go:
    name: Go bindings on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: bindings/go/go.sum

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build C-ABI cdylib and stage for go:embed
        shell: bash
        run: |
          cargo build -p spatio-cabi --release
          os=$(go env GOOS); arch=$(go env GOARCH)
          case "$os" in
            darwin) file=libspatio_cabi.dylib;;
            *)      file=libspatio_cabi.so;;
          esac
          dest="bindings/go/libs/${os}_${arch}"
          mkdir -p "$dest"
          cp "target/release/${file}" "$dest/"

      - name: Check formatting
        working-directory: bindings/go
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "run gofmt"; exit 1; }

      - name: Run go vet
        working-directory: bindings/go
        run: go vet ./...

      - name: Run tests
        working-directory: bindings/go
        run: go test -race ./...
